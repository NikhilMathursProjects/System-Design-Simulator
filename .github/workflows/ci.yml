name: CI

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e engine/
          pip install -e api/
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Test with pytest
        run: pytest --tb=short